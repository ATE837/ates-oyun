<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATEŞ - Son Hayatta Kalan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        /* LOADING EKRANI */
        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .loading-bar {
            width: 300px;
            height: 4px;
            background: #333;
            margin-top: 30px;
            overflow: hidden;
        }
        
        .loading-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b35, #f7931e);
            animation: load 3s ease-out forwards;
        }
        
        @keyframes load {
            to { width: 100%; }
        }
        
        /* ANA MENÜ */
        #mainMenu {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%231a1a2e" width="1200" height="800"/><circle fill="%23ff6b35" opacity="0.1" cx="600" cy="400" r="300"/></svg>');
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .game-title {
            font-size: 6em;
            font-weight: 900;
            background: linear-gradient(45deg, #ff6b35, #f7931e, #ff6b35);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
            text-shadow: 0 0 60px rgba(255,107,53,0.5);
            letter-spacing: 10px;
        }
        
        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .subtitle {
            font-size: 1.3em;
            color: #888;
            margin: 20px 0 50px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        
        .menu-btn {
            padding: 20px 80px;
            margin: 15px;
            background: transparent;
            color: #fff;
            border: 2px solid #ff6b35;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
        }
        
        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,107,53,0.4), transparent);
            transition: 0.5s;
        }
        
        .menu-btn:hover::before {
            left: 100%;
        }
        
        .menu-btn:hover {
            background: #ff6b35;
            box-shadow: 0 0 30px rgba(255,107,53,0.6);
            transform: translateY(-2px);
        }
        
        /* OYUN EKRANI */
        #gameContainer {
            display: none;
            position: relative;
        }
        
        #gameCanvas {
            display: block;
            background: #0f0f23;
        }
        
        /* UI PANEL */
        #ui {
            position: fixed;
            pointer-events: none;
        }
        
        /* SAĞLIK */
        .health-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 250px;
        }
        
        .health-bg {
            width: 100%;
            height: 30px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #444;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .health-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #c0392b, #e74c3c);
            transition: width 0.3s ease;
            position: relative;
        }
        
        .health-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 0.9em;
            text-shadow: 2px 2px 4px #000;
        }
        
        /* STAMINA */
        .stamina-bg {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.6);
            margin-top: 5px;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .stamina-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            transition: width 0.2s;
        }
        
        /* ZAMAN */
        #timeDisplay {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 10px;
            border: 1px solid #444;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .time-icon {
            font-size: 1.3em;
        }
        
        /* ENVANTER */
        #inventory {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #333;
            pointer-events: auto;
        }
        
        .inv-slot {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            border: 2px solid #444;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .inv-slot:hover {
            border-color: #666;
            transform: translateY(-5px);
        }
        
        .inv-slot.active {
            border-color: #ff6b35;
            box-shadow: 0 0 20px rgba(255,107,53,0.4);
            background: linear-gradient(145deg, #2a1a1e, #1a0f0f);
        }
        
        .inv-slot .item-icon {
            font-size: 2em;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        
        .inv-slot .item-count {
            position: absolute;
            bottom: 5px;
            right: 8px;
            font-size: 0.85em;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }
        
        .inv-slot .hotkey {
            position: absolute;
            top: 3px;
            left: 6px;
            font-size: 0.7em;
            color: #888;
        }
        
        /* BİLGİ PANELİ */
        #infoPanel {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            min-width: 200px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.95em;
        }
        
        .info-label {
            color: #888;
        }
        
        .info-value {
            color: #fff;
            font-weight: bold;
        }
        
        /* YAPIM MENÜSÜ */
        #craftingMenu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,10,10,0.95);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ff6b35;
            display: none;
            pointer-events: auto;
            z-index: 500;
        }
        
        .crafting-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            text-align: center;
            color: #ff6b35;
        }
        
        .craft-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            margin: 10px 0;
            background: #1a1a2e;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .craft-item:hover {
            background: #2a2a3e;
            transform: translateX(5px);
        }
        
        /* MESAJ */
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px 60px;
            border-radius: 15px;
            border: 2px solid #ff6b35;
            font-size: 1.5em;
            display: none;
            z-index: 600;
            text-align: center;
        }
        
        /* YAĞMUR EFEKTİ */
        .rain {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><line x1="20" y1="0" x2="15" y2="30" stroke="rgba(200,200,255,0.3)" stroke-width="1"/><line x1="60" y1="0" x2="55" y2="30" stroke="rgba(200,200,255,0.3)" stroke-width="1"/><line x1="90" y1="0" x2="85" y2="30" stroke="rgba(200,200,255,0.3)" stroke-width="1"/></svg>');
            animation: rain 0.5s linear infinite;
            opacity: 0;
            transition: opacity 1s;
        }
        
        @keyframes rain {
            to { background-position: 0 30px; }
        }
    </style>
</head>
<body>
    <!-- LOADING -->
    <div id="loading">
        <div style="font-size: 3em; font-weight: bold; color: #ff6b35;">ATEŞ</div>
        <div style="color: #666; margin-top: 10px;">Yükleniyor...</div>
        <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>
    
    <!-- ANA MENÜ -->
    <div id="mainMenu">
        <div class="game-title">ATEŞ</div>
        <div class="subtitle">Son Hayatta Kalan</div>
        <button class="menu-btn" onclick="startGame()">Hayatta Kal</button>
        <button class="menu-btn" onclick="showHelp()">Nasıl Oynanır</button>
    </div>
    
    <!-- OYUN -->
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div class="rain" id="rain"></div>
        
        <!-- SAĞLIK -->
        <div class="health-container">
            <div class="health-bg">
                <div class="health-fill" id="healthFill">
                    <div class="health-text">100 / 100</div>
                </div>
            </div>
            <div class="stamina-bg">
                <div class="stamina-fill" id="staminaFill"></div>
            </div>
        </div>
        
        <!-- ZAMAN -->
        <div id="timeDisplay">
            <span class="time-icon" id="timeIcon">☀️</span>
            <span id="timeText">06:00</span>
        </div>
        
        <!-- BİLGİ -->
        <div id="infoPanel">
            <div class="info-row">
                <span class="info-label">Gün:</span>
                <span class="info-value" id="dayCount">1</span>
            </div>
            <div class="info-row">
                <span class="info-label">Zombi:</span>
                <span class="info-value" id="zombieCount">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">Sıcaklık:</span>
                <span class="info-value" id="temp">24°C</span>
            </div>
        </div>
        
        <!-- ENVANTER -->
        <div id="inventory">
            <div class="inv-slot active" onclick="selectSlot(0)" data-item="wood">
                <span class="hotkey">1</span>
                <span class="item-icon">🪵</span>
                <span class="item-count" id="inv0">20</span>
            </div>
            <div class="inv-slot" onclick="selectSlot(1)" data-item="stone">
                <span class="hotkey">2</span>
                <span class="item-icon">🪨</span>
                <span class="item-count" id="inv1">10</span>
            </div>
            <div class="inv-slot" onclick="selectSlot(2)" data-item="wall">
                <span class="hotkey">3</span>
                <span class="item-icon">🧱</span>
                <span class="item-count" id="inv2">5</span>
            </div>
            <div class="inv-slot" onclick="selectSlot(3)" data-item="tower">
                <span class="hotkey">4</span>
                <span class="item-icon">🏹</span>
                <span class="item-count" id="inv3">2</span>
            </div>
            <div class="inv-slot" onclick="selectSlot(4)" data-item="campfire">
                <span class="hotkey">5</span>
                <span class="item-icon">🔥</span>
                <span class="item-count" id="inv4">1</span>
            </div>
        </div>
        
        <!-- MESAJ -->
        <div id="message"></div>
    </div>

    <script>
        // Canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Oyun durumu
        const game = {
            player: {
                x: 0, y: 0,
                vx: 0, vy: 0,
                angle: 0,
                health: 100,
                maxHealth: 100,
                stamina: 100,
                speed: 3,
                runSpeed: 6,
                selectedSlot: 0,
                resources: {
                    wood: 20,
                    stone: 10,
                    metal: 5,
                    food: 3
                }
            },
            inventory: [
                { type: 'wood', count: 20 },
                { type: 'stone', count: 10 },
                { type: 'wall', count: 5 },
                { type: 'tower', count: 2 },
                { type: 'campfire', count: 1 }
            ],
            buildings: [],
            trees: [],
            zombies: [],
            particles: [],
            camera: { x: 0, y: 0 },
            time: 360, // 6:00 = 360 dakika (6*60)
            day: 1,
            weather: 'clear', // clear, rain, fog
            worldSize: { w: 4000, h: 4000 }
        };
        
        // Loading
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 3000);
        
        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            
            // Oyuncuyu ortala
            game.player.x = game.worldSize.w / 2;
            game.player.y = game.worldSize.h / 2;
            
            // Orman oluştur
            generateWorld();
            
            // Başlat
            init();
        }
        
        function generateWorld() {
            // Ağaçlar
            for(let i = 0; i < 300; i++) {
                game.trees.push({
                    x: Math.random() * game.worldSize.w,
                    y: Math.random() * game.worldSize.h,
                    type: Math.random() > 0.6 ? 'pine' : (Math.random() > 0.3 ? 'oak' : 'birch'),
                    size: 0.8 + Math.random() * 0.4,
                    health: 100
                });
            }
            
            // Kayalar
            for(let i = 0; i < 50; i++) {
                game.trees.push({
                    x: Math.random() * game.worldSize.w,
                    y: Math.random() * game.worldSize.h,
                    type: 'rock',
                    size: 0.5 + Math.random() * 0.5,
                    health: 200
                });
            }
        }
        
        function init() {
            // Kontroller
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            window.addEventListener('mousemove', e => {
                const rect = canvas.getBoundingClientRect();
                game.mouseX = e.clientX - rect.left;
                game.mouseY = e.clientY - rect.top;
            });
            window.addEventListener('mousedown', handleMouseDown);
            
            // Zaman döngüsü
            setInterval(updateTime, 1000);
            
            // Zombi spawn
            setInterval(() => {
                if(isNight() && game.zombies.length < 30) {
                    spawnZombie();
                }
            }, 5000);
            
            // Hava durumu
            setInterval(changeWeather, 30000);
            
            gameLoop();
        }
        
        function isNight() {
            const hour = Math.floor(game.time / 60);
            return hour < 6 || hour > 20;
        }
        
        function updateTime() {
            game.time++;
            if(game.time >= 1440) { // 24 saat
                game.time = 0;
                game.day++;
            }
            
            const hour = Math.floor(game.time / 60);
            const minute = game.time % 60;
            
            // UI güncelle
            document.getElementById('timeText').textContent = 
                `${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}`;
            document.getElementById('timeIcon').textContent = isNight() ? '🌙' : '☀️';
            document.getElementById('dayCount').textContent = game.day;
            document.getElementById('zombieCount').textContent = game.zombies.length;
            
            // Sıcaklık
            const temp = isNight() ? 15 - Math.random() * 5 : 20 + Math.random() * 10;
            document.getElementById('temp').textContent = temp.toFixed(1) + '°C';
        }
        
        function changeWeather() {
            const weathers = ['clear', 'rain', 'fog'];
            game.weather = weathers[Math.floor(Math.random() * weathers.length)];
            
            const rain = document.getElementById('rain');
            rain.style.opacity = game.weather === 'rain' ? '1' : '0';
        }
        
        function spawnZombie() {
            const angle = Math.random() * Math.PI * 2;
            const dist = 600 + Math.random() * 400;
            
            game.zombies.push({
                x: game.player.x + Math.cos(angle) * dist,
                y: game.player.y + Math.sin(angle) * dist,
                vx: 0, vy: 0,
                health: 100,
                maxHealth: 100,
                speed: 1.5 + Math.random(),
                state: 'chase', // chase, attack, wander
                attackCooldown: 0
            });
        }
        
        function handleKeyDown(e) {
            const key = e.key.toLowerCase();
            const p = game.player;
            
            // Hareket
            if(key === 'w' || key === 'arrowup') p.vy = -1;
            if(key === 's' || key === 'arrowdown') p.vy = 1;
            if(key === 'a' || key === 'arrowleft') p.vx = -1;
            if(key === 'd' || key === 'arrowright') p.vx = 1;
            
            // Koşu
            if(key === 'shift' && p.stamina > 0) {
                p.running = true;
            }
            
            // Slotlar
            if(key >= '1' && key <= '5') {
                selectSlot(parseInt(key) - 1);
            }
        }
        
        function handleKeyUp(e) {
            const key = e.key.toLowerCase();
            const p = game.player;
            
            if(['w','s','arrowup','arrowdown'].includes(key)) p.vy = 0;
            if(['a','d','arrowleft','arrowright'].includes(key)) p.vx = 0;
            if(key === 'shift') p.running = false;
        }
        
        function selectSlot(index) {
            game.player.selectedSlot = index;
            document.querySelectorAll('.inv-slot').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
        }
        
        function handleMouseDown(e) {
            const slot = game.inventory[game.player.selectedSlot];
            if(!slot || slot.count <= 0) return;
            
            const worldX = game.mouseX + game.camera.x;
            const worldY = game.mouseY + game.camera.y;
            
            // Mesafe kontrolü
            const dist = Math.hypot(worldX - game.player.x, worldY - game.player.y);
            if(dist > 150) {
                showMessage('Çok uzak!', 1000);
                return;
            }
            
            // İnşa
            if(['wall', 'tower', 'campfire'].includes(slot.type)) {
                slot.count--;
                game.buildings.push({
                    type: slot.type,
                    x: worldX,
                    y: worldY,
                    health: slot.type === 'wall' ? 500 : slot.type === 'tower' ? 300 : 100,
                    built: Date.now()
                });
                updateInventoryUI();
                addParticle(worldX, worldY, '🔨', 30);
            }
        }
        
        function updateInventoryUI() {
            game.inventory.forEach((item, i) => {
                document.getElementById(`inv${i}`).textContent = item.count;
            });
        }
        
        function showMessage(text, duration = 2000) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', duration);
        }
        
        function addParticle(x, y, emoji, life) {
            game.particles.push({
                x, y, emoji, life, maxLife: life,
                vx: (Math.random() - 0.5) * 2,
                vy: -1 - Math.random()
            });
        }
        
        // ÇİZİM FONKSİYONLARI
        function drawShadow(x, y, size, opacity = 0.3) {
            ctx.fillStyle = `rgba(0,0,0,${opacity})`;
            ctx.beginPath();
            ctx.ellipse(x, y, size, size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawTree(tree, screenX, screenY) {
            const size = 40 * tree.size;
            
            // Gölge
            drawShadow(screenX, screenY + size/2, size/2);
            
            // Ağaç gövdesi
            ctx.fillStyle = '#4a3728';
            ctx.fillRect(screenX - size/6, screenY, size/3, size);
            
            // Yapraklar
            const colors = {
                pine: ['#1b4d3e', '#2d6a4f', '#40916c'],
                oak: ['#2d5016', '#3a5f0b', '#4a6b0f'],
                birch: ['#4a5d23', '#5a6d33', '#6a7d43'],
                rock: ['#555', '#666', '#777']
            };
            
            const c = colors[tree.type] || colors.oak;
            
            if(tree.type === 'rock') {
                // Kaya
                ctx.fillStyle = c[0];
                ctx.beginPath();
                ctx.arc(screenX, screenY + size/3, size/2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = c[1];
                ctx.beginPath();
                ctx.arc(screenX - size/4, screenY + size/4, size/3, 0, Math.PI*2);
                ctx.fill();
            } else {
                // Yaprak katmanları
                for(let i = 0; i < 3; i++) {
                    ctx.fillStyle = c[i];
                    ctx.beginPath();
                    const y = screenY - size/3 + i * size/4;
                    const r = size/2 - i * 5;
                    ctx.arc(screenX, y, r, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }
        
        function drawBuilding(b, screenX, screenY) {
            drawShadow(screenX, screenY + 20, 25);
            
            if(b.type === 'wall') {
                // Duvar
                ctx.fillStyle = '#8b7355';
                ctx.fillRect(screenX - 20, screenY - 30, 40, 50);
                ctx.fillStyle = '#6b5344';
                ctx.fillRect(screenX - 15, screenY - 25, 30, 40);
                // Tuğla detayları
                ctx.fillStyle = '#5a4335';
                for(let i = 0; i < 3; i++) {
                    ctx.fillRect(screenX - 15, screenY - 20 + i * 12, 30, 2);
                }
            } else if(b.type === 'tower') {
                // Kule
                ctx.fillStyle = '#4a5568';
                ctx.fillRect(screenX - 15, screenY - 50, 30, 70);
                ctx.fillStyle = '#2d3748';
                ctx.fillRect(screenX - 20, screenY - 60, 40, 15);
                // Pencere
                ctx.fillStyle = '#f6e05e';
                ctx.fillRect(screenX - 5, screenY - 40, 10, 15);
            } else if(b.type === 'campfire') {
                // Ateş
                ctx.fillStyle = '#744210';
                ctx.beginPath();
                ctx.arc(screenX, screenY, 15, 0, Math.PI, true);
                ctx.fill();
                // Alevler
                const flicker = Math.sin(Date.now() / 100) * 5;
                ctx.fillStyle = '#ff6b35';
                ctx.beginPath();
                ctx.moveTo(screenX - 10, screenY);
                ctx.lineTo(screenX, screenY - 30 + flicker);
                ctx.lineTo(screenX + 10, screenY);
                ctx.fill();
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.moveTo(screenX - 5, screenY);
                ctx.lineTo(screenX, screenY - 20 + flicker/2);
                ctx.lineTo(screenX + 5, screenY);
                ctx.fill();
            }
            
            // Can barı
            if(b.health < (b.type === 'wall' ? 500 : b.type === 'tower' ? 300 : 100)) {
                ctx.fillStyle = '#000';
                ctx.fillRect(screenX - 20, screenY - 70, 40, 6);
                ctx.fillStyle = '#e53e3e';
                const max = b.type === 'wall' ? 500 : b.type === 'tower' ? 300 : 100;
                ctx.fillRect(screenX - 20, screenY - 70, 40 * (b.health/max), 6);
            }
        }
        
        function drawZombie(z, screenX, screenY) {
            drawShadow(screenX, screenY + 15, 15);
            
            // Vücut
            ctx.fillStyle = '#2d5016';
            ctx.beginPath();
            ctx.ellipse(screenX, screenY, 12, 20, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Kafa
            ctx.fillStyle = '#3d6b26';
            ctx.beginPath();
            ctx.arc(screenX, screenY - 20, 10, 0, Math.PI*2);
            ctx.fill();
            
            // Gözler (kırmızı)
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(screenX - 4, screenY - 22, 3, 0, Math.PI*2);
            ctx.arc(screenX + 4, screenY - 22, 3, 0, Math.PI*2);
            ctx.fill();
            
            // Kollar
            ctx.strokeStyle = '#2d5016';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(screenX - 10, screenY - 5);
            ctx.lineTo(screenX - 20, screenY + 10);
            ctx.moveTo(screenX + 10, screenY - 5);
            ctx.lineTo(screenX + 20, screenY + 10);
            ctx.stroke();
        }
        
        function drawPlayer() {
            const px = canvas.width / 2;
            const py = canvas.height / 2;
            
            // Gölge
            drawShadow(px, py + 25, 20);
            
            // Bacaklar (hareket animasyonu)
            const legOffset = Math.sin(Date.now() / 100) * 5;
            ctx.fillStyle = '#2d3748';
            ctx.fillRect(px - 8, py, 6, 25 + legOffset);
            ctx.fillRect(px + 2, py, 6, 25 - legOffset);
            
            // Vücut
            ctx.fillStyle = '#3182ce';
            ctx.fillRect(px - 12, py - 30, 24, 35);
            
            // Kafa
            ctx.fillStyle = '#f6ad55';
            ctx.beginPath();
            ctx.arc(px, py - 40, 12, 0, Math.PI*2);
            ctx.fill();
            
            // Gözler (mouse'a bakar)
            const angle = Math.atan2(game.mouseY - py, game.mouseX - px);
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(px - 4 + Math.cos(angle)*3, py - 42 + Math.sin(angle)*2, 3, 0, Math.PI*2);
            ctx.arc(px + 4 + Math.cos(angle)*3, py - 42 + Math.sin(angle)*2, 3, 0, Math.PI*2);
            ctx.fill();
            
            // Elindeki item
            const slot = game.inventory[game.player.selectedSlot];
            if(slot && slot.count > 0) {
                ctx.font = '20px Arial';
                ctx.fillText(
                    slot.type === 'wood' ? '🪵' : 
                    slot.type === 'stone' ? '🪨' : 
                    slot.type === 'wall' ? '🧱' : 
                    slot.type === 'tower' ? '🏹' : '🔥',
                    px + 20, py - 10
                );
            }
        }
        
        function gameLoop() {
            const p = game.player;
            
            // Güncelle
            let speed = p.running && p.stamina > 0 ? p.runSpeed : p.speed;
            if(p.running && p.stamina > 0) p.stamina -= 0.5;
            else if(p.stamina < 100) p.stamina += 0.2;
            
            p.x += p.vx * speed;
            p.y += p.vy * speed;
            
            // Sınırlar
            p.x = Math.max(50, Math.min(game.worldSize.w - 50, p.x));
            p.y = Math.max(50, Math.min(game.worldSize.h - 50, p.y));
            
            // Kamera
            game.camera.x = p.x - canvas.width / 2;
            game.camera.y = p.y - canvas.height / 2;
            
            // Arka plan (gece/gündüz)
            const hour = Math.floor(game.time / 60);
            let bgBrightness = 1;
            if(hour < 6) bgBrightness = 0.3 + (hour / 6) * 0.7;
            else if(hour > 20) bgBrightness = 1 - ((hour - 20) / 4) * 0.7;
            
            const r = Math.floor(61 * bgBrightness);
            const g = Math.floor(90 * bgBrightness);
            const b = Math.floor(69 * bgBrightness);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Zemin detayları
            ctx.fillStyle = `rgba(255,255,255,${0.05 * bgBrightness})`;
            for(let i = 0; i < 100; i++) {
                const x = ((i * 137) % game.worldSize.w) - game.camera.x;
                const y = ((i * 241) % game.worldSize.h) - game.camera.y;
                if(x > -10 && x < canvas.width + 10 && y > -10 && y < canvas.height + 10) {
                    ctx.fillRect(x, y, 2, 2);
                }
            }
            
            // Objeleri çiz (karakterden uzakta olanlar önce)
            const allObjects = [
                ...game.trees.map(t => ({...t, type: 'tree'})),
                ...game.buildings.map(b => ({...b, type: 'building'})),
                ...game.zombies.map(z => ({...z, type: 'zombie'}))
            ].sort((a, b) => (a.y - b.y));
            
            allObjects.forEach(obj => {
                const sx = obj.x - game.camera.x;
                const sy = obj.y - game.camera.y;
                
                if(sx < -100 || sx > canvas.width + 100 || sy < -100 || sy > canvas.height + 100) return;
                
                if(obj.type === 'tree') drawTree(obj, sx, sy);
                else if(obj.type === 'building') drawBuilding(obj, sx, sy);
                else if(obj.type === 'zombie') drawZombie(obj, sx, sy);
            });
            
            // Oyuncu
            drawPlayer();
            
            // Partiküller
            game.particles = game.particles.filter(pt => {
                pt.x += pt.vx;
                pt.y += pt.vy;
                pt.life--;
                ctx.font = '16px Arial';
                ctx.fillText(pt.emoji, pt.x - game.camera.x, pt.y - game.camera.y);
                return pt.life > 0;
            });
            
            // Gece efekti
            if(isNight()) {
                const grad = ctx.createRadialGradient(
                    canvas.width/2, canvas.height/2, 100,
                    canvas.width/2, canvas.height/2, 600
                );
                grad.addColorStop(0, 'rgba(0,0,0,0)');
                grad.addColorStop(1, `rgba(0,0,0,${0.8 - bgBrightness})`);
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            // UI güncelle
            document.getElementById('healthFill').style.width = (p.health/p.maxHealth*100) + '%';
            document.querySelector('.health-text').textContent = `${Math.floor(p.health)}/${p.maxHealth}`;
            document.getElementById('staminaFill').style.width = p.stamina + '%';
            
            requestAnimationFrame(gameLoop);
        }
        
        function showHelp() {
            alert(`
    NASIL OYNANIR:
    
    WASD - Hareket
    SHIFT - Koşu (stamina gerekir)
    1-5 - Çanta slotları
    MOUSE - Yön
    TIKLA - İnşa et
    
    GÜNDÜZ: Ağaç kes, kaynak topla, kale inşa et
    GECE: Zombiler gelir, kaleyi savun
    
    Hedef: Mümkün olduğunca çok gece hayatta kal!
            `);
        }
    </script>
</body>
</html>
