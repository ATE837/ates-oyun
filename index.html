<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ateş - Hayatta Kal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }
        
        #menu {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #1a1a2e, #0f0f23);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .logo {
            font-size: 6em;
            animation: fire 2s infinite;
        }
        
        @keyframes fire {
            0%, 100% { filter: drop-shadow(0 0 20px #ff6b35); }
            50% { filter: drop-shadow(0 0 40px #ff6b35) drop-shadow(0 0 60px #ff0000); }
        }
        
        h1 {
            font-size: 4em;
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: none;
        }
        
        .btn {
            padding: 20px 60px;
            margin: 15px;
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.6);
        }
        
        #game {
            display: none;
            position: relative;
        }
        
        #gameCanvas {
            display: block;
            background: #2d5016;
        }
        
        /* ÇANTA SİSTEMİ */
        #inventory {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 20px;
            border: 3px solid #ff6b35;
            z-index: 100;
        }
        
        .inv-slot {
            width: 80px;
            height: 80px;
            background: #1a1a2e;
            border: 3px solid #444;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .inv-slot:hover {
            border-color: #666;
            transform: scale(1.1);
        }
        
        .inv-slot.selected {
            border-color: #ff6b35;
            background: #2a1a1e;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
            transform: scale(1.15);
        }
        
        .inv-slot .icon {
            font-size: 2.5em;
        }
        
        .inv-slot .count {
            position: absolute;
            bottom: 5px;
            right: 8px;
            font-size: 0.9em;
            color: #ffd700;
            font-weight: bold;
        }
        
        /* UI */
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ff6b35;
        }
        
        .stat {
            display: flex;
            align-items: center;
            margin: 8px 0;
            font-size: 1.2em;
        }
        
        .health-bar {
            width: 200px;
            height: 25px;
            background: #333;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
            border: 2px solid #fff;
        }
        
        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            width: 100%;
            transition: width 0.3s;
        }
        
        #timeDisplay {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 1.5em;
            border: 2px solid #ffd700;
        }
        
        /* Yapım modu göstergesi */
        #buildMode {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 107, 53, 0.9);
            color: #fff;
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 1.5em;
            display: none;
            z-index: 200;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* Kontroller */
        #controls {
            position: fixed;
            bottom: 120px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9em;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="menu">
        <div class="logo">🔥</div>
        <h1>ATEŞ</h1>
        <p style="color: #aaa; margin-bottom: 40px;">Ormanda Hayatta Kal</p>
        <button class="btn" onclick="startGame()">▶ OYNA</button>
    </div>
    
    <div id="game">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div class="stat">❤️ <span id="healthText">100/100</span></div>
            <div class="health-bar"><div class="health-fill" id="healthBar"></div></div>
            <div class="stat" style="margin-top: 15px;">🌙 Geceler: <span id="days">1</span></div>
        </div>
        
        <div id="timeDisplay">☀️ 02:00</div>
        
        <div id="buildMode">🔨 YAPIM MODU - Yere Tıkla</div>
        
        <!-- ÇANTA -->
        <div id="inventory">
            <div class="inv-slot selected" onclick="selectItem('wall', this)" title="Duvar">
                <span class="icon">🧱</span>
                <span class="count" id="wallCount">5</span>
            </div>
            <div class="inv-slot" onclick="selectItem('tower', this)" title="Kule">
                <span class="icon">🏹</span>
                <span class="count" id="towerCount">2</span>
            </div>
            <div class="inv-slot" onclick="selectItem('trap', this)" title="Tuzak">
                <span class="icon">⚡</span>
                <span class="count" id="trapCount">3</span>
            </div>
            <div class="inv-slot" onclick="selectItem('campfire', this)" title="Kamp Ateşi">
                <span class="icon">🔥</span>
                <span class="count" id="campCount">1</span>
            </div>
        </div>
        
        <div id="controls">
            WASD: Hareket<br>
            1-4: Çanta<br>
            Tık: İnşa/Ateş Et
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Oyun durumu
        let game = {
            player: {
                x: 0, y: 0,
                vx: 0, vy: 0,
                angle: 0,
                health: 100,
                maxHealth: 100,
                speed: 4,
                selectedItem: 'wall'
            },
            inventory: {
                wall: 5,
                tower: 2,
                trap: 3,
                campfire: 1
            },
            buildings: [],
            trees: [],
            zombies: [],
            particles: [],
            camera: { x: 0, y: 0 },
            day: true,
            time: 120,
            days: 1,
            buildMode: false,
            mouse: { x: 0, y: 0 }
        };
        
        const WORLD = { w: 3000, h: 3000 };
        
        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            
            // Oyuncu ortada başlasın
            game.player.x = WORLD.w / 2;
            game.player.y = WORLD.h / 2;
            
            // Ağaçları oluştur
            generateForest();
            
            init();
        }
        
        function generateForest() {
            for(let i = 0; i < 200; i++) {
                game.trees.push({
                    x: Math.random() * WORLD.w,
                    y: Math.random() * WORLD.h,
                    size: 30 + Math.random() * 40,
                    type: Math.random() > 0.7 ? '🌲' : (Math.random() > 0.5 ? '🌳' : '🌴')
                });
            }
        }
        
        function init() {
            // Kontroller
            document.addEventListener('keydown', handleKey);
            document.addEventListener('keyup', handleKeyUp);
            document.addEventListener('mousemove', e => {
                game.mouse.x = e.clientX;
                game.mouse.y = e.clientY;
            });
            document.addEventListener('click', handleClick);
            
            // Zaman döngüsü
            setInterval(() => {
                game.time--;
                if(game.time <= 0) {
                    game.day = !game.day;
                    game.time = game.day ? 120 : 60;
                    if(game.day) {
                        game.days++;
                        // Sabah ödülü
                        game.inventory.wall += 2;
                        game.inventory.tower += 1;
                        game.inventory.trap += 2;
                        updateInventory();
                    }
                }
                updateUI();
            }, 1000);
            
            // Zombi spawn
            setInterval(() => {
                if(!game.day) spawnZombie();
            }, 4000);
            
            gameLoop();
        }
        
        function handleKey(e) {
            const k = e.key.toLowerCase();
            
            // Hareket
            if(k === 'w' || k === 'arrowup') game.player.vy = -game.player.speed;
            if(k === 's' || k === 'arrowdown') game.player.vy = game.player.speed;
            if(k === 'a' || k === 'arrowleft') game.player.vx = -game.player.speed;
            if(k === 'd' || k === 'arrowright') game.player.vx = game.player.speed;
            
            // Çanta slotları
            if(k === '1') selectItem('wall', document.querySelectorAll('.inv-slot')[0]);
            if(k === '2') selectItem('tower', document.querySelectorAll('.inv-slot')[1]);
            if(k === '3') selectItem('trap', document.querySelectorAll('.inv-slot')[2]);
            if(k === '4') selectItem('campfire', document.querySelectorAll('.inv-slot')[3]);
        }
        
        function handleKeyUp(e) {
            const k = e.key.toLowerCase();
            if(['w','s','arrowup','arrowdown'].includes(k)) game.player.vy = 0;
            if(['a','d','arrowleft','arrowright'].includes(k)) game.player.vx = 0;
        }
        
        function selectItem(item, element) {
            game.player.selectedItem = item;
            game.buildMode = true;
            
            document.querySelectorAll('.inv-slot').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            
            document.getElementById('buildMode').style.display = 'block';
        }
        
        function handleClick(e) {
            if(!game.buildMode) return;
            
            const item = game.player.selectedItem;
            if(game.inventory[item] <= 0) return;
            
            // Ekran koordinatlarını dünya koordinatlarına çevir
            const worldX = e.clientX + game.camera.x;
            const worldY = e.clientY + game.camera.y;
            
            // Oyuncudan uzaklık kontrolü
            const dist = Math.hypot(worldX - game.player.x, worldY - game.player.y);
            if(dist > 200) return; // Çok uzaksa inşa etme
            
            game.inventory[item]--;
            updateInventory();
            
            game.buildings.push({
                type: item,
                x: worldX,
                y: worldY,
                health: item === 'wall' ? 100 : item === 'tower' ? 80 : 50
            });
            
            // Efekt
            addParticle(worldX, worldY, '✨', 20);
            
            // Çanta boşaldıysa modu kapat
            if(game.inventory[item] === 0) {
                game.buildMode = false;
                document.getElementById('buildMode').style.display = 'none';
            }
        }
        
        function updateInventory() {
            document.getElementById('wallCount').textContent = game.inventory.wall;
            document.getElementById('towerCount').textContent = game.inventory.tower;
            document.getElementById('trapCount').textContent = game.inventory.trap;
            document.getElementById('campCount').textContent = game.inventory.campfire;
        }
        
        function spawnZombie() {
            const angle = Math.random() * Math.PI * 2;
            const dist = 600;
            game.zombies.push({
                x: game.player.x + Math.cos(angle) * dist,
                y: game.player.y + Math.sin(angle) * dist,
                health: 50,
                speed: 1.5
            });
        }
        
        function addParticle(x, y, emoji, life) {
            game.particles.push({ x, y, emoji, life, vy: -1 });
        }
        
        function updateUI() {
            const m = Math.floor(game.time / 60);
            const s = game.time % 60;
            document.getElementById('timeDisplay').textContent = 
                (game.day ? '☀️' : '🌙') + ` ${m}:${s.toString().padStart(2,'0')}`;
            document.getElementById('timeDisplay').style.borderColor = game.day ? '#ffd700' : '#4a4a6a';
            
            document.getElementById('healthText').textContent = `${Math.floor(game.player.health)}/100`;
            document.getElementById('healthBar').style.width = (game.player.health / game.player.maxHealth * 100) + '%';
            document.getElementById('days').textContent = game.days;
        }
        
        function gameLoop() {
            // Güncelle
            game.player.x += game.player.vx;
            game.player.y += game.player.vy;
            
            // Sınırlar
            game.player.x = Math.max(50, Math.min(WORLD.w - 50, game.player.x));
            game.player.y = Math.max(50, Math.min(WORLD.h - 50, game.player.y));
            
            // Kamera (karakterin arkasından görünüm)
            game.camera.x = game.player.x - canvas.width / 2;
            game.camera.y = game.player.y - canvas.height / 2;
            
            // Arka plan
            ctx.fillStyle = game.day ? '#3d5a45' : '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Zeminde detaylar (çimler)
            ctx.fillStyle = game.day ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.02)';
            for(let i = 0; i < 50; i++) {
                const px = (i * 137) % WORLD.w - game.camera.x;
                const py = (i * 241) % WORLD.h - game.camera.y;
                ctx.fillRect(px, py, 3, 3);
            }
            
            // Ağaçlar (karakterin arkasında)
            game.trees.forEach(tree => {
                const sx = tree.x - game.camera.x;
                const sy = tree.y - game.camera.y;
                
                if(sx > -100 && sx < canvas.width + 100 && sy > -100 && sy < canvas.height + 100) {
                    // Gölge
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.beginPath();
                    ctx.ellipse(sx, sy + tree.size/2, tree.size/2, tree.size/6, 0, 0, Math.PI*2);
                    ctx.fill();
                    
                    // Ağaç
                    ctx.font = `${tree.size}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(tree.type, sx, sy);
                }
            });
            
            // Binalar
            game.buildings.forEach(b => {
                const sx = b.x - game.camera.x;
                const sy = b.y - game.camera.y;
                
                // Gölge
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.ellipse(sx, sy + 25, 30, 10, 0, 0, Math.PI*2);
                ctx.fill();
                
                // Bina
                ctx.font = '50px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let icon = '🧱';
                if(b.type === 'tower') icon = '🏰';
                if(b.type === 'trap') icon = '⚡';
                if(b.type === 'campfire') icon = '🔥';
                
                ctx.fillText(icon, sx, sy);
                
                // Can barı
                if(b.health < 100) {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(sx - 25, sy - 40, 50, 6);
                    ctx.fillStyle = '#0f0';
                    ctx.fillRect(sx - 25, sy - 40, 50 * (b.health/100), 6);
                }
            });
            
            // Zombiler
            game.zombies.forEach((z, i) => {
                const dx = game.player.x - z.x;
                const dy = game.player.y - z.y;
                const dist = Math.hypot(dx, dy);
                
                if(dist > 30) {
                    z.x += (dx/dist) * z.speed;
                    z.y += (dy/dist) * z.speed;
                } else {
                    game.player.health -= 0.5;
                    if(game.player.health <= 0) {
                        alert(`Öldün! ${game.days} gece hayatta kaldın.`);
                        location.reload();
                    }
                }
                
                const sx = z.x - game.camera.x;
                const sy = z.y - game.camera.y;
                
                // Gölge
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(sx, sy + 20, 20, 6, 0, 0, Math.PI*2);
                ctx.fill();
                
                // Zombi
                ctx.font = '40px Arial';
                ctx.fillText('🧟', sx, sy);
            });
            
            // Oyuncu (karakter)
            const px = canvas.width / 2;
            const py = canvas.height / 2;
            
            // Gölge
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath();
            ctx.ellipse(px, py + 25, 25, 8, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Karakter
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🧑‍🌾', px, py);
            
            // Yön oku (mouse'a doğru)
            const angle = Math.atan2(game.mouse.y - py, game.mouse.x - px);
            ctx.save();
            ctx.translate(px, py);
            ctx.rotate(angle);
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath();
            ctx.moveTo(35, 0);
            ctx.lineTo(25, -8);
            ctx.lineTo(25, 8);
            ctx.fill();
            ctx.restore();
            
            // Partiküller
            game.particles = game.particles.filter(p => {
                p.y += p.vy;
                p.life--;
                ctx.font = '20px Arial';
                ctx.fillText(p.emoji, p.x - game.camera.x, p.y - game.camera.y);
                return p.life > 0;
            });
            
            // Gece efekti (fener)
            if(!game.day) {
                const grad = ctx.createRadialGradient(px, py, 100, px, py, 500);
                grad.addColorStop(0, 'rgba(0,0,0,0)');
                grad.addColorStop(1, 'rgba(0,0,0,0.8)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            // Yapım modu göstergesi (mouse pozisyonunda)
            if(game.buildMode) {
                const mx = game.mouse.x;
                const my = game.mouse.y;
                const dist = Math.hypot(mx - px, my - py);
                
                if(dist <= 200) {
                    ctx.strokeStyle = '#ff6b35';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.arc(mx, my, 30, 0, Math.PI*2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    // Menzil çizgisi
                    ctx.strokeStyle = 'rgba(255, 107, 53, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(px, py, 200, 0, Math.PI*2);
                    ctx.stroke();
                }
            }
            
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
